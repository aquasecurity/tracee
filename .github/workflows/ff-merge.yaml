name: "Fast Forward Merge"

on:
  issue_comment:
    types: [created]

permissions: {}

jobs:
  fast-forward:
    # github.event_name: redundant with on.issue_comment today; kept so the job
    # stays correct if on: gains more events later.
    # Comment body must be exactly /fast-forward (no extra text); GitHub == is
    # case-insensitive for strings.
    if: ${{ github.event_name == 'issue_comment'
      && github.event.comment.body == '/fast-forward'
      && github.event.issue.pull_request
      && (github.event.comment.author_association == 'MEMBER'
      || github.event.comment.author_association == 'OWNER') }}
    runs-on: ${{ vars.UBUNTU_X86_RUNNER_LABEL || (github.repository_owner == 'aquasecurity' && 'ubuntu-24.04') }}

    permissions:
      contents: write      # git push (fast-forward the target branch)
      pull-requests: write # fetch PR metadata and post PR comments
      issues: write        # post comments via the issues API endpoint

    steps:
      - name: Fast forwarding
        uses: sequoia-pgp/fast-forward@ea7628bedcb0b0b96e94383ada458d812fca4979 # v1.0.0
        with:
          merge: true
          # To reduce the workflow's verbosity, use 'on-error'
          # to only post a comment when an error occurs, or 'never' to
          # never post a comment.  (In all cases the information is
          # still available in the step's summary.)
          comment: on-error
