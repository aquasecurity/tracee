name: "CodeQL Advanced"

on:
  workflow_dispatch: {}

  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC

  push:
    branches:
      - "main"
      - "release-v*.*"

    paths:
      - "!docs/**"
      - "!deploy/**"
      - "!packaging/**"
      - "!**.yaml"
      - "!**.md"
      - "!**.txt"
      - "!**.conf"
      # override previous rules:
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "**.c"
      - "**.h"
      - "**.go"
      - "**/codeql.yaml"
      - "!.cursor/**"

  pull_request:
    branches:
      - "main"
      - "release-v*.*"

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ vars.UBUNTU_X86_RUNNER_LABEL || (github.repository_owner == 'aquasecurity' && 'ubuntu-2404-4core') }}

    env:
      # "false" is already the default since April 2026, but having the
      # toggle explicit makes it easy to flip for debugging. The repo
      # property "github-codeql-file-coverage-on-prs" can still override
      # this to true (it is evaluated after the env var).
      CODEQL_ACTION_FILE_COVERAGE_ON_PRS: "false"

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [c-cpp, go]
        include:
          - language: c-cpp
            build-mode: manual
          - language: go
            build-mode: manual
            goarch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libelf-dev zlib1g-dev clang make gcc pkgconf file

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"

      - name: Set Go Environment
        if: matrix.language == 'go'
        env:
          GOARCH_VALUE: ${{ matrix.goarch }}
        run: |
          echo "GOOS=linux" >> "${GITHUB_ENV}"
          echo "GOARCH=${GOARCH_VALUE}" >> "${GITHUB_ENV}"

      - name: Update submodules
        run: git submodule update --init --recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended
          config: |
            paths-ignore:
              - 3rdparty

      - name: Build C/eBPF objects
        if: matrix.language == 'c-cpp'
        run: |
          make bpf

      - name: Build Go
        if: matrix.language == 'go'
        run: |
          make

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
